name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zips
        run: |
          # Each plugin gets its own self-contained zip with SKILL.md at root
          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")
            (cd "$plugin_dir" && zip -r "../../${plugin_name}.zip" . -x '*/.DS_Store')
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
