name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build skill zip
        run: |
          zip -r eyesecurity-complisec-skill.zip \
            SKILL.md \
            skills/ \
            .compliance/profile.example.json \
            -x '*/.DS_Store'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: eyesecurity-complisec-skill.zip
          generate_release_notes: true
